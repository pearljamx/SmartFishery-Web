{% extends "base.html" %} {% block title %}水质告警阈值配置 - 智慧渔场管理系统{%
endblock %} {% block extra_css %}
<style>
  .threshold-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .threshold-card {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f1f35 100%);
    border: 2px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s ease;
  }

  .threshold-card:hover {
    border-color: #60a5fa;
    box-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
  }

  .threshold-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border-color);
  }

  .threshold-name {
    font-size: 18px;
    font-weight: bold;
    color: #60a5fa;
  }

  .threshold-unit {
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: bold;
  }

  .form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 10px;
  }

  .form-group {
    flex: 1;
  }

  .form-group label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 5px;
    display: block;
  }

  .form-group input {
    width: 100%;
    padding: 8px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 14px;
  }

  .form-group input:focus {
    border-color: #60a5fa;
    outline: none;
    box-shadow: 0 0 5px rgba(96, 165, 250, 0.3);
  }

  .warning-level-select {
    width: 100%;
    padding: 8px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 14px;
  }

  .action-buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }

  .action-buttons button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-save {
    background: #10b981;
    color: white;
  }

  .btn-save:hover {
    background: #059669;
    transform: translateY(-2px);
  }

  .btn-reset {
    background: var(--border-color);
    color: var(--text-primary);
  }

  .btn-reset:hover {
    background: rgba(96, 165, 250, 0.2);
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--border-color);
  }

  .stats-card {
    background: rgba(0, 212, 255, 0.1);
    border-left: 4px solid #60a5fa;
    padding: 15px;
    border-radius: 6px;
    margin-bottom: 20px;
  }

  .stats-card-title {
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 5px;
  }

  .stats-card-value {
    color: #60a5fa;
    font-size: 24px;
    font-weight: bold;
  }
</style>
{% endblock %} {% block content %}
<div class="page-header">
  <div>
    <h1><i class="fas fa-sliders-h"></i> 水质告警阈值配置</h1>
    <p>配置水质参数的告警规则，实现自动异常告警</p>
  </div>
</div>

<!-- 统计信息 -->
<div class="stats-card">
  <div class="stats-card-title">已配置告警规则</div>
  <div class="stats-card-value" id="activeThresholdCount">0</div>
</div>

<!-- 阈值配置卡片网格 -->
<div class="threshold-grid" id="thresholdGrid">
  <div style="grid-column: 1/-1; text-align: center; padding: 40px">
    加载中...
  </div>
</div>

<script>
  let thresholdData = {};

  // 页面加载时获取阈值
  document.addEventListener("DOMContentLoaded", function () {
    loadThresholds();
  });

  function loadThresholds() {
    apiCall("/thresholds", "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          thresholdData = {};
          const grid = document.getElementById("thresholdGrid");
          grid.innerHTML = "";

          if (response.data.length === 0) {
            grid.innerHTML =
              '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">暂无告警规则</div>';
            return;
          }

          let activeCount = 0;
          response.data.forEach((threshold) => {
            thresholdData[threshold.id] = { ...threshold };
            if (threshold.is_active) activeCount++;

            const card = createThresholdCard(threshold);
            grid.appendChild(card);
          });

          document.getElementById("activeThresholdCount").textContent =
            activeCount;
        }
      },
      errorCallback: function (error) {
        console.error("加载阈值失败:", error);
        document.getElementById("thresholdGrid").innerHTML =
          '<div style="grid-column: 1/-1; text-align: center; color: var(--text-danger);">加载失败</div>';
      },
    });
  }

  function createThresholdCard(threshold) {
    const card = document.createElement("div");
    card.className = "threshold-card";
    card.innerHTML = `
      <div class="threshold-header">
        <div>
          <div class="threshold-name">${threshold.parameter_name}</div>
          <div class="threshold-unit">${threshold.unit || "-"}</div>
        </div>
        <input type="checkbox" ${threshold.is_active ? "checked" : ""} 
               onchange="toggleThreshold(${threshold.id})" 
               title="启用/禁用此阈值" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>最小值</label>
          <input type="number" step="0.01" 
                 value="${threshold.min_value || ""}" 
                 onchange="updateThresholdField(${threshold.id}, 'min_value', this.value)"
                 placeholder="下限" />
        </div>
        <div class="form-group">
          <label>最大值</label>
          <input type="number" step="0.01" 
                 value="${threshold.max_value || ""}" 
                 onchange="updateThresholdField(${threshold.id}, 'max_value', this.value)"
                 placeholder="上限" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>告警级别</label>
          <select class="warning-level-select" 
                  onchange="updateThresholdField(${threshold.id}, 'warning_level', this.value)">
            <option value="warning" ${threshold.warning_level === "warning" ? "selected" : ""}>普通告警</option>
            <option value="critical" ${threshold.warning_level === "critical" ? "selected" : ""}>严重告警</option>
          </select>
        </div>
      </div>

      <div style="color: var(--text-secondary); font-size: 12px; margin-top: 10px;">
        ${threshold.description || ""}
      </div>

      <div class="action-buttons">
        <button class="btn-save" onclick="saveThreshold(${threshold.id})">
          <i class="fas fa-save"></i> 保存
        </button>
      </div>
    `;
    return card;
  }

  function updateThresholdField(thresholdId, field, value) {
    if (!thresholdData[thresholdId]) return;
    thresholdData[thresholdId][field] = value;
  }

  function toggleThreshold(thresholdId) {
    if (!thresholdData[thresholdId]) return;
    thresholdData[thresholdId].is_active =
      !thresholdData[thresholdId].is_active;
  }

  function saveThreshold(thresholdId) {
    const threshold = thresholdData[thresholdId];
    if (!threshold) return;

    // 验证数据
    const minVal = parseFloat(threshold.min_value);
    const maxVal = parseFloat(threshold.max_value);

    if (!isNaN(minVal) && !isNaN(maxVal) && minVal >= maxVal) {
      showToast("最小值不能大于等于最大值", "warning");
      return;
    }

    const data = {
      id: thresholdId,
      min_value:
        threshold.min_value === "" ? null : parseFloat(threshold.min_value),
      max_value:
        threshold.max_value === "" ? null : parseFloat(threshold.max_value),
      warning_level: threshold.warning_level,
      is_active: threshold.is_active,
    };

    apiCall("/thresholds/update", "POST", data, {
      successCallback: function (response) {
        if (response.status === "success") {
          showToast("阈值保存成功", "success");
          loadThresholds();
        } else {
          showToast(response.message || "保存失败", "danger");
        }
      },
      errorCallback: function (error) {
        showToast("请求失败: " + error, "danger");
      },
    });
  }

  function showToast(message, type = "info") {
    const typeMap = {
      success: "success",
      danger: "danger",
      warning: "warning",
      info: "info",
    };

    const alertClass = `alert alert-${typeMap[type] || type}`;
    const alertHtml = `<div class="${alertClass} alert-dismissible fade show" role="alert" style="position: fixed; top: 50px; right: 20px; z-index: 9999; min-width: 300px;">
          ${message}
          <button type="button" class="close" data-dismiss="alert" aria-label="Close">
              <span aria-hidden="true">&times;</span>
          </button>
      </div>`;

    const alertContainer = document.createElement("div");
    alertContainer.innerHTML = alertHtml;
    document.body.appendChild(alertContainer.firstChild);

    setTimeout(() => {
      const toasts = document.querySelectorAll(".alert");
      if (toasts.length > 0) {
        toasts[toasts.length - 1].remove();
      }
    }, 3000);
  }
</script>
{% endblock %}
