{% extends "base.html" %} {% block title %}鱼苗管理 - 管理员系统{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="fas fa-fish"></i> 鱼苗管理</h1>
</div>

<!-- Tabs -->
<ul class="nav nav-tabs" role="tablist">
  <li class="nav-item">
    <a class="nav-link active" data-toggle="tab" href="#suppliersTab"
      >供应商管理</a
    >
  </li>
  <li class="nav-item">
    <a class="nav-link" data-toggle="tab" href="#productsTab">产品管理</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" data-toggle="tab" href="#ordersTab">采购订单</a>
  </li>
</ul>

<!-- Tab 1: Suppliers -->
<div id="suppliersTab" class="tab-pane fade show active">
  <div style="padding: 30px 0">
    <div style="display: flex; gap: 20px; margin-bottom: 20px">
      <input
        type="text"
        id="supplierSearch"
        placeholder="搜索供应商名称..."
        class="form-control"
        style="max-width: 250px"
      />
      <select
        id="supplierStatusFilter"
        class="form-control"
        style="max-width: 150px"
      >
        <option value="">全部状态</option>
        <option value="active">正常</option>
        <option value="inactive">禁用</option>
      </select>
      <button class="btn btn-primary" onclick="showAddSupplierModal()">
        <i class="fas fa-plus"></i> 添加供应商
      </button>
    </div>

    <div class="row" id="suppliersGrid">
      <div class="col-12 text-center">加载中...</div>
    </div>
  </div>
</div>

<!-- Tab 2: Products Management -->
<div id="productsTab" class="tab-pane fade">
  <div style="padding: 30px 0">
    <div style="display: flex; gap: 20px; margin-bottom: 20px">
      <input
        type="text"
        id="productSearch"
        placeholder="搜索产品名称、品种..."
        class="form-control"
        style="max-width: 300px"
      />
      <select
        id="productSupplierFilter"
        class="form-control"
        style="max-width: 200px"
      >
        <option value="">所有供应商</option>
      </select>
      <select
        id="productStatusFilter"
        class="form-control"
        style="max-width: 150px"
      >
        <option value="">全部状态</option>
        <option value="1">上架</option>
        <option value="0">下架</option>
      </select>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped" id="productsTable">
            <thead>
              <tr>
                <th>产品名称</th>
                <th>品种</th>
                <th>规格</th>
                <th>供应商</th>
                <th>单价</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="7" class="text-center">加载中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Tab 3: Orders -->
<div id="ordersTab" class="tab-pane fade">
  <div style="padding: 30px 0">
    <div style="display: flex; gap: 10px; margin-bottom: 20px">
      <select
        id="orderSupplierFilter"
        class="form-control"
        style="max-width: 200px"
      >
        <option value="">所有供应商</option>
      </select>
      <select
        id="orderStatusFilter"
        class="form-control"
        style="max-width: 150px"
      >
        <option value="">所有状态</option>
        <option value="draft">草稿</option>
        <option value="confirmed">已确认</option>
        <option value="shipped">已发货</option>
        <option value="received">已收货</option>
      </select>
      <button class="btn btn-primary" onclick="showNewOrderModal()">
        <i class="fas fa-plus"></i> 新建订单
      </button>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped" id="ordersTable">
            <thead>
              <tr>
                <th>订单号</th>
                <th>供应商</th>
                <th>鱼池</th>
                <th>商品数</th>
                <th>金额</th>
                <th>状态</th>
                <th>下单日期</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="8" class="text-center">加载中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Supplier Modal -->
<div class="modal fade" id="supplierModal" tabindex="-1">
  <div class="modal-dialog">
    <div
      class="modal-content"
      style="
        background: linear-gradient(135deg, #1e3a5f 0%, #0f1f35 100%);
        border: 2px solid var(--border-color);
      "
    >
      <div
        class="modal-header"
        style="border-bottom: 2px solid var(--border-color)"
      >
        <h5 class="modal-title" id="supplierModalTitle">添加供应商</h5>
        <button type="button" class="close text-light" data-dismiss="modal">
          &times;
        </button>
      </div>
      <div class="modal-body">
        <form id="supplierForm">
          <input type="hidden" id="supplierId" />
          <div class="form-group">
            <label>供应商名称</label>
            <input
              type="text"
              class="form-control"
              name="name"
              id="supplierName"
              required
            />
          </div>
          <div class="form-group">
            <label>联系人</label>
            <input
              type="text"
              class="form-control"
              name="contact_person"
              id="supplierContactPerson"
              required
            />
          </div>
          <div class="form-group">
            <label>电话</label>
            <input
              type="tel"
              class="form-control"
              name="phone"
              id="supplierPhone"
              required
            />
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input
              type="email"
              class="form-control"
              name="email"
              id="supplierEmail"
              required
            />
          </div>
          <div class="form-group">
            <label>地址</label>
            <textarea
              class="form-control"
              name="address"
              id="supplierAddress"
              rows="2"
            ></textarea>
          </div>
          <div class="form-group">
            <label>备注</label>
            <textarea
              class="form-control"
              name="notes"
              id="supplierNotes"
              rows="2"
            ></textarea>
          </div>
          <div
            class="form-group"
            id="supplierStatusGroup"
            style="display: none"
          >
            <label>状态</label>
            <select class="form-control" name="status" id="supplierStatus">
              <option value="active">正常</option>
              <option value="inactive">禁用</option>
            </select>
          </div>
        </form>
      </div>
      <div
        class="modal-footer"
        style="border-top: 2px solid var(--border-color)"
      >
        <button type="button" class="btn btn-secondary" data-dismiss="modal">
          取消
        </button>
        <button type="button" class="btn btn-primary" onclick="saveSupplier()">
          保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Supplier Products Modal -->
<div class="modal fade" id="supplierProductsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div
      class="modal-content"
      style="
        background: linear-gradient(135deg, #1e3a5f 0%, #0f1f35 100%);
        border: 2px solid var(--border-color);
      "
    >
      <div
        class="modal-header"
        style="border-bottom: 2px solid var(--border-color)"
      >
        <h5 class="modal-title" id="supplierProductsTitle">供应商产品</h5>
        <button type="button" class="close text-light" data-dismiss="modal">
          &times;
        </button>
      </div>
      <div class="modal-body">
        <div id="supplierProductsList" class="table-responsive">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>产品名称</th>
                <th>品种</th>
                <th>规格</th>
                <th>单价</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="supplierProductsTableBody">
              <tr>
                <td colspan="5" class="text-center">加载中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div
        class="modal-footer"
        style="border-top: 2px solid var(--border-color)"
      >
        <button type="button" class="btn btn-secondary" data-dismiss="modal">
          关闭
        </button>
      </div>
    </div>
  </div>
</div>

<!-- New Order Modal -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div
      class="modal-content"
      style="
        background: linear-gradient(135deg, #1e3a5f 0%, #0f1f35 100%);
        border: 2px solid var(--border-color);
      "
    >
      <div
        class="modal-header"
        style="border-bottom: 2px solid var(--border-color)"
      >
        <h5 class="modal-title">新建采购订单</h5>
        <button type="button" class="close text-light" data-dismiss="modal">
          &times;
        </button>
      </div>
      <div class="modal-body">
        <div id="orderStep1">
          <h6>第一步：选择供应商</h6>
          <select id="orderSupplierSelect" class="form-control">
            <option value="">-- 选择供应商 --</option>
          </select>
          <button class="btn btn-primary mt-3" onclick="goToStep2()">
            下一步
          </button>
        </div>

        <div id="orderStep2" style="display: none">
          <h6>第二步：选择商品</h6>
          <div
            id="productsSelection"
            style="max-height: 300px; overflow-y: auto"
          ></div>
          <button class="btn btn-secondary mt-3" onclick="goToStep1()">
            上一步
          </button>
          <button class="btn btn-primary mt-3" onclick="goToStep3()">
            下一步
          </button>
        </div>

        <div id="orderStep3" style="display: none">
          <h6>第三步：确认订单</h6>
          <div
            id="orderReview"
            style="
              background: rgba(0, 0, 0, 0.2);
              padding: 15px;
              border-radius: 8px;
              margin-bottom: 15px;
            "
          ></div>
          <div class="form-group">
            <label>预期交付日期</label>
            <input type="date" id="expectedDeliveryDate" class="form-control" />
          </div>
          <button class="btn btn-secondary" onclick="goToStep2()">
            上一步
          </button>
          <button class="btn btn-success" onclick="submitOrder()">
            提交订单
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Product Detail Modal -->
<div class="modal fade" id="productDetailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div
      class="modal-content"
      style="
        background: linear-gradient(135deg, #1e3a5f 0%, #0f1f35 100%);
        border: 2px solid var(--border-color);
      "
    >
      <div
        class="modal-header"
        style="border-bottom: 2px solid var(--border-color)"
      >
        <h5 class="modal-title">产品详情</h5>
        <button type="button" class="close text-light" data-dismiss="modal">
          &times;
        </button>
      </div>
      <div class="modal-body" id="productDetailContent">
        <!-- 内容动态加载 -->
      </div>
      <div
        class="modal-footer"
        style="border-top: 2px solid var(--border-color)"
      >
        <button type="button" class="btn btn-secondary" data-dismiss="modal">
          关闭
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Product Edit Modal -->
<div class="modal fade" id="productEditModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div
      class="modal-content"
      style="
        background: linear-gradient(135deg, #1e3a5f 0%, #0f1f35 100%);
        border: 2px solid var(--border-color);
      "
    >
      <div
        class="modal-header"
        style="border-bottom: 2px solid var(--border-color)"
      >
        <h5 class="modal-title">编辑产品</h5>
        <button type="button" class="close text-light" data-dismiss="modal">
          &times;
        </button>
      </div>
      <div class="modal-body">
        <form id="productEditForm">
          <input type="hidden" id="editProductId" />
          <div class="form-group">
            <label>产品名称 <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              id="editProductName"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-group col-md-6">
              <label>品种 <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                id="editProductSpecies"
                required
              />
            </div>
            <div class="form-group col-md-6">
              <label>规格</label>
              <input type="text" class="form-control" id="editProductGrade" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group col-md-6">
              <label>销售价 <span class="text-danger">*</span></label>
              <input
                type="number"
                step="0.01"
                class="form-control"
                id="editProductUnitPrice"
                required
              />
            </div>
            <div class="form-group col-md-6">
              <label>成本价</label>
              <input
                type="number"
                step="0.01"
                class="form-control"
                id="editProductCostPrice"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group col-md-6">
              <label>生长周期（天）</label>
              <input
                type="number"
                class="form-control"
                id="editProductGrowthCycle"
              />
            </div>
            <div class="form-group col-md-6">
              <label>成活率（%）</label>
              <input
                type="number"
                min="0"
                max="100"
                step="0.1"
                class="form-control"
                id="editProductSurvivalRate"
              />
            </div>
          </div>
          <div class="form-group">
            <label>描述</label>
            <textarea
              class="form-control"
              id="editProductDescription"
              rows="3"
            ></textarea>
          </div>
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="editProductActive"
              checked
            />
            <label class="form-check-label" for="editProductActive">上架</label>
          </div>
        </form>
      </div>
      <div
        class="modal-footer"
        style="border-top: 2px solid var(--border-color)"
      >
        <button type="button" class="btn btn-secondary" data-dismiss="modal">
          取消
        </button>
        <button
          type="button"
          class="btn btn-primary"
          onclick="saveProductChanges()"
        >
          保存
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--border-color);
  }

  .nav-tabs {
    border-bottom: 2px solid var(--border-color);
    margin-bottom: 30px;
  }

  .nav-tabs .nav-link {
    color: var(--text-secondary);
    border: none;
    border-bottom: 3px solid transparent;
  }

  .nav-tabs .nav-link.active {
    color: #60a5fa;
    border-bottom-color: #60a5fa;
    background: none;
  }

  .supplier-card {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f1f35 100%);
    border: 2px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    transition: all 0.3s ease;
  }

  .supplier-card:hover {
    border-color: #60a5fa;
    box-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
  }

  .supplier-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 15px;
  }

  .supplier-name {
    font-size: 18px;
    font-weight: bold;
    color: #60a5fa;
  }

  .supplier-status {
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    background: rgba(76, 175, 80, 0.2);
    color: #4ade80;
  }

  .supplier-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 15px;
  }

  .supplier-actions {
    display: flex;
    gap: 8px;
  }

  .supplier-actions button {
    flex: 1;
    padding: 6px 10px;
    font-size: 12px;
  }

  .form-control {
    background: rgba(0, 0, 0, 0.2);
    border: 2px solid var(--border-color);
    color: var(--text-primary);
  }

  .form-control:focus {
    background: rgba(0, 0, 0, 0.3);
    border-color: #60a5fa;
    color: var(--text-primary);
  }

  .card {
    background: linear-gradient(135deg, var(--card-bg) 0%, #0a1a3a 100%);
    border: 2px solid var(--border-color);
    border-radius: 12px;
  }

  .tab-pane {
    animation: fadeIn 0.3s ease-in;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  /* 产品管理样式 */
  .detail-panel {
    background: rgba(255, 255, 255, 0.05);
    border-left: 4px solid #60a5fa;
    padding: 15px;
    border-radius: 4px;
    margin: 10px 0;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .detail-row:last-child {
    border-bottom: none;
  }

  .detail-row .label {
    font-weight: bold;
    color: #a0aec0;
    min-width: 100px;
  }

  .detail-row .value {
    color: #e2e8f0;
    flex: 1;
    text-align: right;
  }

  #productsTable button {
    margin: 2px;
    padding: 4px 8px;
    font-size: 12px;
  }
</style>

<script>
  let currentSupplierIdForOrder = null;
  let selectedProducts = {};

  document.addEventListener("DOMContentLoaded", function () {
    loadSuppliers();
    loadProducts();
    loadOrders();
    loadSuppliersList();
  });

  function loadSuppliers() {
    apiCall("/suppliers?page=1&per_page=20", "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const grid = document.getElementById("suppliersGrid");
          grid.innerHTML = "";

          if (response.data.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center">暂无供应商</div>';
            return;
          }

          response.data.forEach((supplier) => {
            const statusClass =
              supplier.status === "active" ? "success" : "danger";
            const statusText = supplier.status === "active" ? "正常" : "禁用";

            const card = `
            <div class="col-lg-6 col-md-12">
              <div class="supplier-card">
                <div class="supplier-header">
                  <div class="supplier-name">${supplier.name}</div>
                  <span class="supplier-status badge-${statusClass}">${statusText}</span>
                </div>
                <div class="supplier-info">
                  <div><strong>联系人：</strong> ${supplier.contact_person}</div>
                  <div><strong>电话：</strong> ${supplier.phone}</div>
                  <div><strong>邮箱：</strong> ${supplier.email}</div>
                  <div><strong>地址：</strong> ${supplier.address || "--"}</div>
                </div>
                <div class="supplier-actions">
                  <button class="btn btn-sm btn-info" onclick="editSupplier(${supplier.id})">编辑</button>
                  <button class="btn btn-sm btn-warning" onclick="viewSupplierProducts(${supplier.id})">产品</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteSupplier(${supplier.id})">删除</button>
                </div>
              </div>
            </div>
          `;
            grid.innerHTML += card;
          });
        }
      },
    });
  }

  function showAddSupplierModal() {
    document.getElementById("supplierForm").reset();
    document.getElementById("supplierId").value = "";
    document.getElementById("supplierStatusGroup").style.display = "none";
    document.getElementById("supplierModalTitle").textContent = "添加供应商";
    $("#supplierModal").modal("show");
  }

  function saveSupplier() {
    const formData = new FormData(document.getElementById("supplierForm"));
    const data = Object.fromEntries(formData);

    apiCall("/suppliers/add", "POST", data, {
      successCallback: function () {
        showNotification("供应商已保存", "success");
        $("#supplierModal").modal("hide");
        loadSuppliers();
      },
    });
  }

  function loadSuppliersList() {
    apiCall("/suppliers?page=1&per_page=100", "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const select = document.getElementById("orderSupplierSelect");
          response.data.forEach((supplier) => {
            const option = document.createElement("option");
            option.value = supplier.id;
            option.textContent = supplier.name;
            select.appendChild(option);
          });
        }
      },
    });
  }

  function loadOrders() {
    apiCall("/purchase-orders?page=1&per_page=20", "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const tbody = document.querySelector("#ordersTable tbody");
          tbody.innerHTML = "";

          if (response.data.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="8" class="text-center">暂无订单</td></tr>';
            return;
          }

          response.data.forEach((order) => {
            const date = new Date(order.order_date).toLocaleDateString();
            const row = `
            <tr>
              <td>#${order.id}</td>
              <td>供应商 ${order.supplier_id}</td>
              <td>鱼池 ${order.pond_id}</td>
              <td>${order.items_count || 0}</td>
              <td>¥${order.total_amount.toFixed(2)}</td>
              <td><span class="badge badge-secondary">${order.status}</span></td>
              <td>${date}</td>
              <td><button class="btn btn-sm btn-primary" onclick="viewOrder(${order.id})">查看</button></td>
            </tr>
          `;
            tbody.innerHTML += row;
          });
        }
      },
    });
  }

  function showNewOrderModal() {
    $("#orderModal").modal("show");
  }

  function goToStep2() {
    const supplierId = document.getElementById("orderSupplierSelect").value;
    if (!supplierId) {
      showNotification("请选择供应商", "warning");
      return;
    }

    currentSupplierIdForOrder = supplierId;
    document.getElementById("orderStep1").style.display = "none";
    document.getElementById("orderStep2").style.display = "block";
    loadSupplierProducts(supplierId);
  }

  function goToStep1() {
    document.getElementById("orderStep2").style.display = "none";
    document.getElementById("orderStep3").style.display = "none";
    document.getElementById("orderStep1").style.display = "block";
  }

  function loadSupplierProducts(supplierId) {
    apiCall(`/suppliers/${supplierId}/products`, "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const div = document.getElementById("productsSelection");
          div.innerHTML = "";

          response.data.forEach((product) => {
            const item = `
            <div style="padding: 10px; background: rgba(0,0,0,0.1); margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>${product.product_name}</strong> (${product.species})<br/>
                <small>¥${product.unit_price.toFixed(2)}/尾</small>
              </div>
              <div>
                <input type="number" min="0" value="0" onchange="updateProductSelection(${product.id}, this.value)" style="width: 60px; padding: 5px;" />
              </div>
            </div>
          `;
            div.innerHTML += item;
          });
        }
      },
    });
  }

  function updateProductSelection(productId, quantity) {
    selectedProducts[productId] = parseInt(quantity) || 0;
  }

  function goToStep3() {
    const hasItems = Object.values(selectedProducts).some((qty) => qty > 0);
    if (!hasItems) {
      showNotification("请选择至少一个商品", "warning");
      return;
    }

    document.getElementById("orderStep2").style.display = "none";
    document.getElementById("orderStep3").style.display = "block";

    // Show review
    const review = Object.entries(selectedProducts)
      .filter(([_, qty]) => qty > 0)
      .map(([id, qty]) => `<div>商品 ${id}: ${qty} 尾</div>`)
      .join("");

    document.getElementById("orderReview").innerHTML =
      review || "<div>未选择商品</div>";
  }

  function submitOrder() {
    const supplierId = currentSupplierIdForOrder;
    const expectedDeliveryDate = document.getElementById(
      "expectedDeliveryDate",
    ).value;

    if (!expectedDeliveryDate) {
      showNotification("请选择预期交付日期", "warning");
      return;
    }

    const items = Object.entries(selectedProducts)
      .filter(([_, qty]) => qty > 0)
      .map(([productId, quantity]) => ({
        product_id: parseInt(productId),
        quantity: parseInt(quantity),
      }));

    const orderData = {
      supplier_id: parseInt(supplierId),
      pond_id: 1, // Default for demo
      expected_delivery_date: expectedDeliveryDate,
      items: items,
    };

    apiCall("/purchase-orders/create", "POST", orderData, {
      successCallback: function () {
        showNotification("订单已创建", "success");
        $("#orderModal").modal("hide");
        loadOrders();
        selectedProducts = {};
      },
    });
  }

  function saveSupplier() {
    const supplierId = document.getElementById("supplierId").value;
    const formData = new FormData(document.getElementById("supplierForm"));
    const data = Object.fromEntries(formData);

    if (supplierId) {
      // 编辑供应商
      apiCall(`/suppliers/${supplierId}/edit`, "POST", data, {
        successCallback: function () {
          showNotification("供应商已更新", "success");
          $("#supplierModal").modal("hide");
          loadSuppliers();
        },
        errorCallback: function (error) {
          showNotification("更新失败: " + error, "error");
        },
      });
    } else {
      // 添加供应商
      apiCall("/suppliers/add", "POST", data, {
        successCallback: function () {
          showNotification("供应商已保存", "success");
          $("#supplierModal").modal("hide");
          loadSuppliers();
        },
        errorCallback: function (error) {
          showNotification("保存失败: " + error, "error");
        },
      });
    }
  }

  function editSupplier(id) {
    // 获取供应商详情
    apiCall(`/suppliers/${id}`, "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const data = response.data;
          document.getElementById("supplierId").value = id;
          document.getElementById("supplierName").value = data.name;
          document.getElementById("supplierContactPerson").value =
            data.contact_person;
          document.getElementById("supplierPhone").value = data.phone;
          document.getElementById("supplierEmail").value = data.email;
          document.getElementById("supplierAddress").value = data.address || "";
          document.getElementById("supplierNotes").value = data.notes || "";
          document.getElementById("supplierStatus").value =
            data.status || "active";
          document.getElementById("supplierStatusGroup").style.display =
            "block";
          document.getElementById("supplierModalTitle").textContent =
            "编辑供应商";
          $("#supplierModal").modal("show");
        }
      },
      errorCallback: function (error) {
        showNotification("加载供应商信息失败", "error");
      },
    });
  }

  function deleteSupplier(id) {
    if (confirm("确认要删除该供应商吗？此操作不可撤销。")) {
      apiCall(`/suppliers/${id}/delete`, "DELETE", null, {
        successCallback: function (response) {
          showNotification(response.message || "供应商已删除", "success");
          loadSuppliers();
        },
        errorCallback: function (error) {
          showNotification("删除失败: " + error, "error");
        },
      });
    }
  }

  function viewSupplierProducts(id) {
    // 显示供应商的产品列表
    document.getElementById("supplierProductsTitle").textContent = "供应商产品";

    apiCall(`/suppliers/${id}/products`, "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const tbody = document.getElementById("supplierProductsTableBody");
          tbody.innerHTML = "";

          if (response.data.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="5" class="text-center">该供应商暂无产品</td></tr>';
          } else {
            response.data.forEach((product) => {
              const statusText = product.is_active ? "上架" : "下架";
              const statusClass = product.is_active ? "success" : "secondary";
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${product.product_name}</td>
                <td>${product.species}</td>
                <td>${product.grade || "-"}</td>
                <td>¥${product.unit_price.toFixed(2)}</td>
                <td><span class="badge badge-${statusClass}">${statusText}</span></td>
              `;
              tbody.appendChild(row);
            });
          }

          $("#supplierProductsModal").modal("show");
        }
      },
      errorCallback: function (error) {
        showNotification("加载产品失败: " + error, "error");
      },
    });
  }

  function viewOrder(id) {
    showNotification("订单详情 (ID: " + id + ")", "info");
  }

  // ============================================================
  // 产品管理函数 (Task1)
  // ============================================================

  function loadProducts() {
    apiCall("/products", "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const tbody = document.querySelector("#productsTable tbody");
          tbody.innerHTML = "";

          if (response.data.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="7" class="text-center">暂无产品</td></tr>';
            return;
          }

          response.data.forEach((product) => {
            const statusText = product.is_active ? "上架" : "下架";
            const statusClass = product.is_active ? "success" : "secondary";

            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${product.product_name}</td>
              <td>${product.species}</td>
              <td>${product.grade || "-"}</td>
              <td>${product.supplier_name}</td>
              <td>¥${product.unit_price.toFixed(2)}</td>
              <td><span class="badge badge-${statusClass}">${statusText}</span></td>
              <td>
                <button class="btn btn-sm btn-info" onclick="showProductDetail(${product.id})" title="查看">
                  <i class="fas fa-eye"></i>
                </button>
                <button class="btn btn-sm btn-warning" onclick="editProduct(${product.id})" title="编辑">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${product.id})" title="删除">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            `;
            tbody.appendChild(row);
          });
        }
      },
      errorCallback: function (error) {
        console.error("加载产品失败:", error);
        document.querySelector("#productsTable tbody").innerHTML =
          '<tr><td colspan="7" class="text-center text-danger">加载失败</td></tr>';
      },
    });
  }

  function showProductDetail(productId) {
    apiCall(`/products/${productId}`, "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const data = response.data;
          let detailHtml = `
            <div class="detail-panel">
              <div class="detail-row">
                <span class="label">产品名称:</span>
                <span class="value">${data.product_name}</span>
              </div>
              <div class="detail-row">
                <span class="label">品种:</span>
                <span class="value">${data.species}</span>
              </div>
              <div class="detail-row">
                <span class="label">规格:</span>
                <span class="value">${data.grade || "-"}</span>
              </div>
              <div class="detail-row">
                <span class="label">供应商:</span>
                <span class="value">${data.supplier_name} (${data.supplier_phone || "未知"})</span>
              </div>
              <div class="detail-row">
                <span class="label">销售价:</span>
                <span class="value">¥${data.unit_price.toFixed(2)}</span>
              </div>
              <div class="detail-row">
                <span class="label">成本价:</span>
                <span class="value">${data.cost_price ? "¥" + data.cost_price.toFixed(2) : "-"}</span>
              </div>
              <div class="detail-row">
                <span class="label">生长周期:</span>
                <span class="value">${data.growth_cycle_days ? data.growth_cycle_days + " 天" : "-"}</span>
              </div>
              <div class="detail-row">
                <span class="label">成活率:</span>
                <span class="value">${data.survival_rate ? (data.survival_rate * 100).toFixed(1) + "%" : "-"}</span>
              </div>
              <div class="detail-row">
                <span class="label">状态:</span>
                <span class="value">${data.is_active ? '<span class="badge badge-success">上架</span>' : '<span class="badge badge-secondary">下架</span>'}</span>
              </div>
              <div class="detail-row">
                <span class="label">描述:</span>
                <span class="value">${data.description || "-"}</span>
              </div>
              <div class="detail-row">
                <span class="label">创建时间:</span>
                <span class="value">${new Date(data.created_at).toLocaleString("zh-CN")}</span>
              </div>
            </div>
          `;

          document.getElementById("productDetailContent").innerHTML =
            detailHtml;
          $("#productDetailModal").modal("show");
        }
      },
      errorCallback: function (error) {
        showNotification("获取产品详情失败", "error");
      },
    });
  }

  function editProduct(productId) {
    apiCall(`/products/${productId}`, "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const data = response.data;
          // 填充编辑表单
          document.getElementById("editProductId").value = productId;
          document.getElementById("editProductName").value = data.product_name;
          document.getElementById("editProductSpecies").value = data.species;
          document.getElementById("editProductGrade").value = data.grade || "";
          document.getElementById("editProductUnitPrice").value =
            data.unit_price;
          document.getElementById("editProductCostPrice").value =
            data.cost_price || "";
          document.getElementById("editProductGrowthCycle").value =
            data.growth_cycle_days || "";
          document.getElementById("editProductSurvivalRate").value =
            data.survival_rate ? data.survival_rate * 100 : "";
          document.getElementById("editProductDescription").value =
            data.description || "";
          document.getElementById("editProductActive").checked = data.is_active;

          $("#productEditModal").modal("show");
        }
      },
      errorCallback: function (error) {
        showNotification("获取产品信息失败", "error");
      },
    });
  }

  function saveProductChanges() {
    const productId = document.getElementById("editProductId").value;
    const data = {
      product_name: document.getElementById("editProductName").value,
      species: document.getElementById("editProductSpecies").value,
      grade: document.getElementById("editProductGrade").value,
      unit_price: parseFloat(
        document.getElementById("editProductUnitPrice").value,
      ),
      cost_price: document.getElementById("editProductCostPrice").value
        ? parseFloat(document.getElementById("editProductCostPrice").value)
        : null,
      growth_cycle_days: document.getElementById("editProductGrowthCycle").value
        ? parseInt(document.getElementById("editProductGrowthCycle").value)
        : null,
      survival_rate: document.getElementById("editProductSurvivalRate").value
        ? parseFloat(document.getElementById("editProductSurvivalRate").value) /
          100
        : null,
      description: document.getElementById("editProductDescription").value,
      is_active: document.getElementById("editProductActive").checked,
    };

    apiCall(`/products/${productId}/edit`, "POST", data, {
      successCallback: function (response) {
        if (response.status === "success") {
          showNotification("产品更新成功", "success");
          $("#productEditModal").modal("hide");
          loadProducts(); // 刷新列表
        } else {
          showNotification(response.message || "更新失败", "error");
        }
      },
      errorCallback: function (error) {
        showNotification("更新失败: " + error, "error");
      },
    });
  }

  function deleteProduct(productId) {
    if (confirm("确定要删除这个产品吗？此操作不可撤销。")) {
      apiCall(`/products/${productId}/delete`, "DELETE", null, {
        successCallback: function (response) {
          if (response.status === "success") {
            showNotification(response.message || "删除成功", "success");
            loadProducts(); // 刷新列表
          } else {
            showNotification(response.message || "删除失败", "error");
          }
        },
        errorCallback: function (error) {
          showNotification("删除失败: " + error, "error");
        },
      });
    }
  }
</script>
{% endblock %}
