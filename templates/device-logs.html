{% extends "base.html" %} {% block title %}设备操作日志 - 智慧渔场管理系统{% endblock %} {% block extra_css %}
<style>
  .device-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--border-color);
  }

  .device-info {
    flex: 1;
  }

  .device-name {
    font-size: 28px;
    font-weight: bold;
    color: #60a5fa;
    margin-bottom: 5px;
  }

  .device-meta {
    color: var(--text-secondary);
    font-size: 13px;
  }

  .back-button {
    padding: 10px 20px;
    background: var(--border-color);
    border: none;
    border-radius: 6px;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .back-button:hover {
    background: rgba(96, 165, 250, 0.2);
    border-color: #60a5fa;
  }

  .filter-panel {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 30px;
  }

  .filter-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 15px;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
  }

  .filter-group label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 5px;
    font-weight: bold;
  }

  .filter-group input,
  .filter-group select {
    padding: 8px 12px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 14px;
  }

  .filter-group input:focus,
  .filter-group select:focus {
    border-color: #60a5fa;
    outline: none;
    box-shadow: 0 0 5px rgba(96, 165, 250, 0.3);
  }

  .filter-buttons {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 15px;
  }

  .filter-buttons button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-filter {
    background: #60a5fa;
    color: white;
  }

  .btn-filter:hover {
    background: #3b82f6;
    transform: translateY(-2px);
  }

  .btn-reset {
    background: var(--border-color);
    color: var(--text-primary);
  }

  .btn-reset:hover {
    background: rgba(96, 165, 250, 0.2);
  }

  .logs-timeline {
    position: relative;
    padding: 0;
  }

  .logs-timeline::before {
    content: '';
    position: absolute;
    left: 20px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, #60a5fa, rgba(96, 165, 250, 0.2));
  }

  .log-item {
    margin-bottom: 20px;
    margin-left: 60px;
    position: relative;
  }

  .log-item::before {
    content: '';
    position: absolute;
    left: -45px;
    top: 5px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #60a5fa;
    border: 3px solid #0f1f35;
    transition: all 0.3s ease;
  }

  .log-item:hover::before {
    width: 16px;
    height: 16px;
    left: -47px;
    top: 3px;
    background: #3b82f6;
  }

  .log-card {
    background: rgba(0, 0, 0, 0.2);
    border-left: 4px solid #60a5fa;
    border-radius: 8px;
    padding: 15px;
    transition: all 0.3s ease;
  }

  .log-item:hover .log-card {
    background: rgba(96, 165, 250, 0.05);
    box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
  }

  .log-time {
    color: #60a5fa;
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .log-action {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .action-on {
    background: rgba(16, 185, 129, 0.2);
    color: #10b981;
  }

  .action-off {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
  }

  .action-control {
    background: rgba(249, 115, 22, 0.2);
    color: #f97316;
  }

  .action-maintenance {
    background: rgba(168, 85, 247, 0.2);
    color: #a855f7;
  }

  .action-other {
    background: rgba(100, 116, 139, 0.2);
    color: #94a3b8;
  }

  .log-state {
    display: flex;
    gap: 15px;
    margin: 10px 0;
    font-size: 12px;
  }

  .state-item {
    flex: 1;
  }

  .state-label {
    color: var(--text-secondary);
    margin-bottom: 3px;
  }

  .state-value {
    color: var(--text-primary);
    font-weight: bold;
  }

  .state-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .state-arrow::after {
    content: '→';
    color: var(--text-secondary);
    font-weight: bold;
    font-size: 16px;
  }

  .log-details {
    margin-top: 10px;
    padding: 10px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 6px;
    border-left: 3px solid rgba(96, 165, 250, 0.3);
    font-size: 12px;
    color: var(--text-secondary);
    max-height: 100px;
    overflow-y: auto;
  }

  .log-meta {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .pagination {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: 30px;
  }

  .pagination button,
  .pagination span {
    padding: 8px 12px;
    border: 1px solid var(--border-color);
    background: rgba(0, 0, 0, 0.2);
    color: var(--text-primary);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }

  .pagination button:hover:not(:disabled) {
    border-color: #60a5fa;
    background: rgba(96, 165, 250, 0.1);
  }

  .pagination button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .pagination .active {
    background: #60a5fa;
    color: white;
    border-color: #60a5fa;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 30px;
  }

  .stat-card {
    background: rgba(0, 0, 0, 0.2);
    border-left: 4px solid #60a5fa;
    padding: 15px;
    border-radius: 6px;
  }

  .stat-label {
    color: var(--text-secondary);
    font-size: 12px;
    margin-bottom: 5px;
  }

  .stat-value {
    color: #60a5fa;
    font-size: 20px;
    font-weight: bold;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 20px;
    opacity: 0.5;
  }
</style>
{% endblock %} {% block content %}
<div class="device-header">
  <div class="device-info">
    <div class="device-name"><i class="fas fa-cogs"></i> {{ device_name }}</div>
    <div class="device-meta">设备ID: {{ device_id }} | 查看操作日志</div>
  </div>
  <button class="back-button" onclick="history.back()">
    <i class="fas fa-arrow-left"></i> 返回
  </button>
</div>

<!-- 统计信息 -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">总操作数</div>
    <div class="stat-value" id="totalLogs">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">今日操作</div>
    <div class="stat-value" id="todayLogs">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">启动次数</div>
    <div class="stat-value" id="onLogs">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">停止次数</div>
    <div class="stat-value" id="offLogs">0</div>
  </div>
</div>

<!-- 筛选面板 -->
<div class="filter-panel">
  <div class="filter-row">
    <div class="filter-group">
      <label>操作类型</label>
      <select id="filterAction">
        <option value="">全部</option>
        <option value="on">启动</option>
        <option value="off">停止</option>
        <option value="control">控制</option>
        <option value="maintenance">维护</option>
      </select>
    </div>
    <div class="filter-group">
      <label>操作人</label>
      <input type="text" id="filterOperator" placeholder="输入操作人..." />
    </div>
  </div>

  <div class="filter-row">
    <div class="filter-group">
      <label>开始时间</label>
      <input type="datetime-local" id="filterStartTime" />
    </div>
    <div class="filter-group">
      <label>结束时间</label>
      <input type="datetime-local" id="filterEndTime" />
    </div>
  </div>

  <div class="filter-buttons">
    <button class="btn-filter" onclick="applyFilters()">
      <i class="fas fa-search"></i> 筛选
    </button>
    <button class="btn-reset" onclick="resetFilters()">
      <i class="fas fa-redo"></i> 重置
    </button>
  </div>
</div>

<!-- 日志时间线 -->
<div class="logs-timeline" id="logsTimeline">
  <div class="empty-state">
    <div class="empty-state-icon"><i class="fas fa-hourglass-start"></i></div>
    <p>加载中...</p>
  </div>
</div>

<!-- 分页 -->
<div class="pagination" id="pagination"></div>

<script>
  let currentPage = 1;
  const perPage = 50;
  const deviceId = {{ device_id }};

  document.addEventListener('DOMContentLoaded', function() {
    loadLogs();
  });

  function loadLogs(page = 1) {
    currentPage = page;
    apiCall(`/devices/${deviceId}/logs?page=${page}&per_page=${perPage}`, 'GET', null, {
      successCallback: function(response) {
        if (response.status === 'success') {
          renderLogs(response.data);
          renderPagination(response.pagination);
          updateStats(response.data);
        }
      },
      errorCallback: function(error) {
        console.error('加载日志失败:', error);
        document.getElementById('logsTimeline').innerHTML =
          '<div class="empty-state"><p style="color: var(--text-danger);">加载失败</p></div>';
      }
    });
  }

  function applyFilters() {
    const filters = {
      page: 1,
      per_page: perPage,
      action: document.getElementById('filterAction').value || undefined,
      operator: document.getElementById('filterOperator').value || undefined,
      start_time: document.getElementById('filterStartTime').value || undefined,
      end_time: document.getElementById('filterEndTime').value || undefined
    };

    apiCall(`/devices/${deviceId}/logs/filter`, 'POST', filters, {
      successCallback: function(response) {
        if (response.status === 'success') {
          renderLogs(response.data);
          renderPagination(response.pagination);
          updateStats(response.data);
        }
      },
      errorCallback: function(error) {
        console.error('筛选失败:', error);
      }
    });
  }

  function resetFilters() {
    document.getElementById('filterAction').value = '';
    document.getElementById('filterOperator').value = '';
    document.getElementById('filterStartTime').value = '';
    document.getElementById('filterEndTime').value = '';
    loadLogs(1);
  }

  function renderLogs(logs) {
    const timeline = document.getElementById('logsTimeline');
    timeline.innerHTML = '';

    if (logs.length === 0) {
      timeline.innerHTML =
        '<div class="empty-state"><div class="empty-state-icon"><i class="fas fa-inbox"></i></div><p>暂无操作日志</p></div>';
      return;
    }

    logs.forEach(log => {
      const logItem = document.createElement('div');
      logItem.className = 'log-item';

      const actionClass = getActionClass(log.action);
      const actionLabel = getActionLabel(log.action);

      let stateSection = '';
      if (log.previous_state || log.current_state) {
        stateSection = `
          <div class="log-state">
            <div class="state-item">
              <div class="state-label">前一状态</div>
              <div class="state-value">${log.previous_state || '-'}</div>
            </div>
            <div class="state-arrow"></div>
            <div class="state-item">
              <div class="state-label">当前状态</div>
              <div class="state-value">${log.current_state || '-'}</div>
            </div>
          </div>
        `;
      }

      let detailsSection = '';
      if (log.details) {
        detailsSection = `<div class="log-details">${log.details}</div>`;
      }

      logItem.innerHTML = `
        <div class="log-card">
          <div class="log-time"><i class="fas fa-clock"></i> ${new Date(log.log_time).toLocaleString('zh-CN')}</div>
          <span class="log-action ${actionClass}">${actionLabel}</span>
          ${stateSection}
          ${detailsSection}
          <div class="log-meta">
            <span><i class="fas fa-user"></i> ${log.operator || '系统'}</span>
          </div>
        </div>
      `;
      timeline.appendChild(logItem);
    });
  }

  function renderPagination(pagination) {
    const paginationDiv = document.getElementById('pagination');
    paginationDiv.innerHTML = '';

    if (pagination.pages <= 1) return;

    // 上一页
    const prevBtn = document.createElement('button');
    prevBtn.textContent = '上一页';
    prevBtn.disabled = pagination.page === 1;
    prevBtn.onclick = () => {
      if (pagination.page > 1) loadLogs(pagination.page - 1);
    };
    paginationDiv.appendChild(prevBtn);

    // 页码
    for (let i = 1; i <= pagination.pages; i++) {
      if (
        i === 1 ||
        i === pagination.pages ||
        (i >= pagination.page - 2 && i <= pagination.page + 2)
      ) {
        const pageBtn = document.createElement('button');
        pageBtn.textContent = i;
        pageBtn.className = i === pagination.page ? 'active' : '';
        pageBtn.onclick = () => loadLogs(i);
        paginationDiv.appendChild(pageBtn);
      } else if (i === 2 || i === pagination.pages - 1) {
        const ellipsis = document.createElement('span');
        ellipsis.textContent = '...';
        paginationDiv.appendChild(ellipsis);
      }
    }

    // 下一页
    const nextBtn = document.createElement('button');
    nextBtn.textContent = '下一页';
    nextBtn.disabled = pagination.page === pagination.pages;
    nextBtn.onclick = () => {
      if (pagination.page < pagination.pages) loadLogs(pagination.page + 1);
    };
    paginationDiv.appendChild(nextBtn);
  }

  function updateStats(logs) {
    const today = new Date().toDateString();
    let todayCount = 0;
    let onCount = 0;
    let offCount = 0;

    logs.forEach(log => {
      if (new Date(log.log_time).toDateString() === today) todayCount++;
      if (log.action === 'on') onCount++;
      if (log.action === 'off') offCount++;
    });

    document.getElementById('todayLogs').textContent = todayCount;
    document.getElementById('onLogs').textContent = onCount;
    document.getElementById('offLogs').textContent = offCount;
  }

  function getActionClass(action) {
    const map = {
      on: 'action-on',
      off: 'action-off',
      control: 'action-control',
      maintenance: 'action-maintenance'
    };
    return map[action] || 'action-other';
  }

  function getActionLabel(action) {
    const map = {
      on: '启动',
      off: '停止',
      control: '控制',
      maintenance: '维护'
    };
    return map[action] || action;
  }
</script>
{% endblock %}
